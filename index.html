<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASAS Employee Knowledge Base</title>
<style>
  :root {
    --navy: #1F497D;
    --blue: #2E75B5;
    --blue-light: #D6E4F0;
    --green-dark: #375623;
    --green-light: #E2EFDA;
    --rust: #843C0C;
    --rust-light: #FCE4D6;
    --grey-dark: #404040;
    --grey-light: #EDEDED;
    --white: #ffffff;
    --bg: #F4F6F9;
    --sidebar-w: 230px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: #222;
    display: flex;
    min-height: 100vh;
  }

  /* ── SIDEBAR ─────────────────────────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--navy);
    color: #fff;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
  }

  #sidebar .logo {
    padding: 20px 16px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  #sidebar .logo .org { font-size: 13px; font-weight: bold; color: #aac8e8; letter-spacing: .5px; }
  #sidebar .logo .title { font-size: 15px; font-weight: bold; margin-top: 4px; line-height: 1.3; }

  #sidebar nav { padding: 10px 0; flex: 1; }

  #sidebar nav .section-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 11px 16px;
    background: none;
    border: none;
    color: #cde;
    font-family: Arial, sans-serif;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .15s, border-color .15s;
  }
  #sidebar nav .section-btn:hover { background: rgba(255,255,255,0.08); }
  #sidebar nav .section-btn.active {
    background: rgba(255,255,255,0.13);
    border-left-color: #5EB8FF;
    color: #fff;
    font-weight: bold;
  }
  #sidebar nav .section-btn .num {
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold; flex-shrink: 0;
  }
  #sidebar nav .section-btn.active .num { background: #5EB8FF; color: #000; }

  /* ── MAIN ────────────────────────────────────────────────────── */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── TOP BAR ─────────────────────────────────────────────────── */
  #topbar {
    background: var(--white);
    border-bottom: 2px solid var(--blue);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  #topbar h1 { font-size: 18px; color: var(--navy); flex: 1; }
  #search {
    padding: 7px 12px;
    border: 1px solid #ccc;
    border-radius: 20px;
    font-size: 13px;
    width: 240px;
    outline: none;
    font-family: Arial, sans-serif;
  }
  #search:focus { border-color: var(--blue); box-shadow: 0 0 0 2px #d0e5f7; }

  /* ── CONTENT ─────────────────────────────────────────────────── */
  #content {
    padding: 28px;
    flex: 1;
  }

  .section-panel { display: none; }
  .section-panel.active { display: block; }

  .section-header {
    background: var(--navy);
    color: #fff;
    padding: 16px 22px;
    border-radius: 8px 8px 0 0;
    font-size: 17px;
    font-weight: bold;
    letter-spacing: .3px;
  }
  .section-subtitle {
    background: var(--blue);
    color: #fff;
    padding: 7px 22px;
    font-size: 12px;
    margin-bottom: 20px;
    border-radius: 0 0 8px 8px;
  }

  /* ── BUCKET GRID ─────────────────────────────────────────────── */
  .buckets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 900px) { .buckets { grid-template-columns: 1fr; } }

  .bucket {
    background: var(--white);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .bucket-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    font-weight: bold;
    font-size: 14px;
    color: #fff;
    cursor: pointer;
    user-select: none;
  }
  .bucket-header .icon { font-size: 17px; }
  .bucket-header .count {
    margin-left: auto;
    background: rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 1px 9px;
    font-size: 12px;
    font-weight: normal;
  }
  .bucket-header .chevron { font-size: 12px; transition: transform .2s; }
  .bucket.collapsed .bucket-header .chevron { transform: rotate(-90deg); }

  .bucket-systems .bucket-header   { background: #2E75B5; }
  .bucket-documents .bucket-header { background: #375623; }
  .bucket-sop .bucket-header       { background: #843C0C; }
  .bucket-other .bucket-header     { background: #404040; }

  .bucket-items { padding: 4px 0; }
  .bucket.collapsed .bucket-items { display: none; }

  .bucket-item {
    display: flex;
    gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
    line-height: 1.5;
    transition: background .12s;
  }
  .bucket-item:last-child { border-bottom: none; }
  .bucket-item:hover { background: #f8f9fb; }
  .bucket-item .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }
  .bucket-systems .dot   { background: #2E75B5; }
  .bucket-documents .dot { background: #375623; }
  .bucket-sop .dot       { background: #843C0C; }
  .bucket-other .dot     { background: #707070; }

  .bucket-item.hidden { display: none; }

  .bucket-item a {
    color: #1a56a0;
    text-decoration: none;
    font-weight: bold;
  }
  .bucket-item a:hover { text-decoration: underline; }

  /* Highlight states for all bucket items */
  .bucket-item { cursor: pointer; }
  .bucket-item.highlight-green {
    background: #d4edda !important;
    border-left: 4px solid #28a745;
  }
  .bucket-item.highlight-yellow {
    background: #fff9c4 !important;
    border-left: 4px solid #f0c040;
  }
  .highlight-tag {
    font-size: 10px;
    font-weight: bold;
    border-radius: 10px;
    padding: 1px 7px;
    margin-left: 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tag-have  { background: #28a745; color: #fff; }
  .tag-need  { background: #f0c040; color: #333; }


  .bucket-legend {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 12px;
    padding: 7px 14px;
    background: #f0f4f8;
    border-bottom: 1px solid #dde4ec;
  }
  .bucket-legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%; display: inline-block;
  }
  .legend-dot.green  { background: #28a745; }
  .legend-dot.yellow { background: #f0c040; }
  .legend-hint { color: #777; font-style: italic; }

  /* ── SEARCH HIGHLIGHT ─────────────────────────────────────────── */
  mark { background: #fff176; border-radius: 2px; }

  /* ── FOOTER ──────────────────────────────────────────────────── */
  #footer {
    text-align: center;
    color: #999;
    font-size: 11px;
    padding: 14px;
    border-top: 1px solid #e5e5e5;
    background: #fff;
  }
</style>
</head>

function renderAll() {
  const nav = document.getElementById("nav");
  const content = document.getElementById("content");
  nav.innerHTML = '';
  content.innerHTML = '';

  sections.forEach((sec, idx) => {
    // Sidebar button
    const btn = document.createElement("button");
    btn.className = "section-btn" + (idx === 0 ? " active" : "");
    btn.dataset.id = sec.id;
    btn.innerHTML = `<span class="num">${sec.num}</span>${sec.label}`;
    btn.onclick = () => switchSection(sec.id);
    nav.appendChild(btn);

    // Panel
    const panel = document.createElement("div");
    panel.className = "section-panel" + (idx === 0 ? " active" : "");
    panel.id = "panel-" + sec.id;

    panel.innerHTML = `
      <div class="section-header">Section ${sec.num}: ${sec.label}</div>
      <div class="section-subtitle">${sec.subtitle}</div>
      <div class="buckets" id="buckets-${sec.id}"></div>
    `;
    content.appendChild(panel);

    const bucketsEl = panel.querySelector(`#buckets-${sec.id}`);
    ["Systems","Documents","SOP","Other"].forEach(bname => {
      const cfg = BUCKET_CONFIG[bname];
      const items = sec.buckets[bname];
      const bucket = document.createElement("div");
      bucket.className = `bucket ${cfg.cls}`;
      bucket.dataset.bucket = bname;

      const hdr = document.createElement("div");
      hdr.className = "bucket-header";
      hdr.innerHTML = `<span class="icon">${cfg.icon}</span>${bname}<span class="count">${items.length}</span><span class="chevron">▾</span>`;
      hdr.onclick = () => bucket.classList.toggle("collapsed");

      const itemsEl = document.createElement("div");
      itemsEl.className = "bucket-items";
      items.forEach(text => {
        const row = document.createElement("div");
        row.className = "bucket-item";
        row.innerHTML = `<span class="dot"></span><span class="item-text">${text}</span>`;
        itemsEl.appendChild(row);
      });

      bucket.appendChild(hdr);
      bucket.appendChild(itemsEl);
      bucketsEl.appendChild(bucket);
    });
  });
}

function switchSection(id) {
  document.querySelectorAll(".section-btn").forEach(b => b.classList.toggle("active", b.dataset.id === id));
  document.querySelectorAll(".section-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + id));
  const sec = sections.find(s => s.id === id);
  document.getElementById("topbar-title").textContent = `Section ${sec.num}: ${sec.label}`;
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch(query) {
  const q = query.trim().toLowerCase();
  const words = q.split(/\s+/).filter(w => w.length > 1);

  if (!q || words.length === 0) {
    document.querySelectorAll(".bucket-item").forEach(el => {
      el.classList.remove("hidden");
      const textEl = el.querySelector(".item-text");
      textEl.querySelectorAll("mark").forEach(m => m.replaceWith(m.textContent));
    });
    document.querySelectorAll(".bucket").forEach(b => b.classList.remove("collapsed"));
    document.querySelectorAll(".section-panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".section-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(".section-panel").classList.add("active");
    document.querySelector(".section-btn").classList.add("active");
    document.getElementById("topbar-title").textContent = "Section 1: Hiring";
    return;
  }

  let firstMatch = null;
  sections.forEach(sec => {
    let secHasMatch = false;
    const panel = document.getElementById("panel-" + sec.id);
    panel.querySelectorAll(".bucket-item").forEach(el => {
      const textEl = el.querySelector(".item-text");
      const lo = textEl.textContent.toLowerCase();
      // Match if ALL words appear anywhere in the text (handles plurals naturally)
      const matches = words.every(w => lo.includes(w));
      if (matches) {
        el.classList.remove("hidden");
        textEl.querySelectorAll("mark").forEach(m => m.replaceWith(m.textContent));
        words.forEach(w => highlightNode(textEl, w));
        secHasMatch = true;
        if (!firstMatch) firstMatch = sec.id;
      } else {
        el.classList.add("hidden");
      }
    });
    panel.querySelectorAll(".bucket").forEach(b => {
      const hasVisible = [...b.querySelectorAll(".bucket-item")].some(i => !i.classList.contains("hidden"));
      b.classList.toggle("collapsed", !hasVisible);
    });
    panel.classList.toggle("active", secHasMatch);
  });
  document.querySelectorAll(".section-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.id === firstMatch);
  });
  if (firstMatch) {
    const sec = sections.find(s => s.id === firstMatch);
    document.getElementById("topbar-title").textContent = `Search results – Section ${sec.num}: ${sec.label}`;
  }
}

function highlightNode(node, q) {
  // Remove existing marks first
  node.querySelectorAll("mark").forEach(m => m.replaceWith(m.textContent));
  // Walk text nodes and wrap matches
  const walk = document.createTreeWalker(node, NodeFilter.SHOW_TEXT);
  const matches = [];
  let n;
  while ((n = walk.nextNode())) {
    const idx = n.textContent.toLowerCase().indexOf(q);
    if (idx !== -1) matches.push({ node: n, idx });
  }
  matches.reverse().forEach(({ node: n, idx }) => {
    const after = n.splitText(idx + q.length);
    const matched = n.splitText(idx);
    const mark = document.createElement("mark");
    mark.textContent = matched.textContent;
    matched.replaceWith(mark);
  });
}

const STORAGE_KEY = "asas_kb_highlights";

function loadHighlights() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveHighlights(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function applyState(item, state) {
  const states = [null, "highlight-green", "highlight-yellow"];
  const tags   = [null, "tag-have", "tag-need"];
  const labels = [null, "✓ Have", "✦ Need"];

  states.forEach(s => s && item.classList.remove(s));
  const existing = item.querySelector(".highlight-tag");
  if (existing) existing.remove();

  const idx = states.indexOf(state);
  if (idx > 0) {
    item.classList.add(state);
    const t = document.createElement("span");
    t.className = `highlight-tag ${tags[idx]}`;
    t.textContent = labels[idx];
    item.appendChild(t);
  }
}

function addSystemsInteractivity() {
  const saved = loadHighlights();
  const states = [null, "highlight-green", "highlight-yellow"];

  document.querySelectorAll(".bucket").forEach((bucket, bIdx) => {
    // Insert legend
    const legend = document.createElement("div");
    legend.className = "bucket-legend";
    legend.innerHTML = `
      <span><span class="legend-dot green"></span> Have</span>
      <span><span class="legend-dot yellow"></span> Need</span>
      <span class="legend-hint">Click any item to mark it</span>
    `;
    bucket.querySelector(".bucket-items").before(legend);

    bucket.querySelectorAll(".bucket-item").forEach((item, iIdx) => {
      const key = `b${bIdx}_i${iIdx}`;

      // Restore saved state
      if (saved[key]) applyState(item, saved[key]);

      item.addEventListener("click", (e) => {
        // Don't toggle color when clicking a link or any element inside a link
        if (e.target.closest("a") || e.target.closest("span[data-doc]")) return;

        let current = states.findIndex(s => s && item.classList.contains(s));
        if (current === -1) current = 0;
        const next = (current + 1) % states.length;
        const nextState = states[next];

        applyState(item, nextState);

        // Persist
        const data = loadHighlights();
        if (nextState) { data[key] = nextState; }
        else { delete data[key]; }
        saveHighlights(data);
      });
    });
  });
}

function highlight(text, q) {
  const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
  return escHtml(text).replace(regex, "<mark>$1</mark>");
}

renderAll();
addSystemsInteractivity();

function downloadShareable() {
  // Read current highlights from localStorage
  const highlights = loadHighlights();

  // Get the current HTML source
  let html = document.documentElement.outerHTML;

  // Build a JSON block of highlights to embed
  const encoded = JSON.stringify(highlights);

  // Inject an auto-apply script — S variable avoids literal tag names breaking the HTML parser
  const S = 'script';
  const injectScript = `<${S} id="embedded-highlights">(function(){var embedded=${encoded};window.loadHighlights=function(){return embedded;};}());<\/${S}>`;

  // Insert just before the main script block
  html = html.replace('<' + S + '>\n// ── DATA', injectScript + '\n<' + S + '>\n// ── DATA');

  // Also update the title to indicate it's a shared snapshot
  const now = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  html = html.replace(
    'ASAS Full-Time Employee Handbook · Updated 11/2018 v1 · Reorganized Knowledge Base',
    `ASAS Full-Time Employee Handbook · Shared Snapshot · ${now} · HAVE/NEED labels shown`
  );

  // Download the file
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ASAS_Knowledge_Base_Shared_${now.replace(/ /g,'_').replace(/,/g,'')}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
}
